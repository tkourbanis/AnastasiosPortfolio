<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Rotated square border -->
  <rect x="6" y="6" width="20" height="20" rx="1"
        stroke="#1e3a8a" stroke-width="2" fill="white"
        transform="rotate(45 16 16)" />
  <!-- AK text, counter-rotated to stay upright -->
  <text x="16" y="20"
        font-family="Inter, Arial, sans-serif"
        font-size="9"
        font-weight="700"
        fill="#1e3a8a"
        text-anchor="middle"
        letter-spacing="0.5">AK</text>
</svg>
